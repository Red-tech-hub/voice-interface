# Detekt static analysis configuration
# Based on detekt default config with project-specific overrides

style:
  active: true
  MagicNumber:
    active: false
  WildcardImport:
    active: true

complexity:
  active: true
  TooManyFunctions:
    active: false
  LongParameterList:
    functionThreshold: 8

naming:
  active: true
  PackageNaming:
    active: true

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

potential-bugs:
  active: true

comments:
  active: true
  EndOfSentenceFormat:
    active: false
